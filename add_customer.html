{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-building me-2"></i>Add Customer</h1>
</div>

<form method="post" class="content-max-width-500">
  <div class="card">
    <div class="card-header">Customer Details</div>
    <div class="card-body row g-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" required placeholder="e.g. Celestica"/>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Contact Name</label>
        <input type="text" name="contact_name" class="form-control" placeholder="Primary contact"/>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Contact Email</label>
        <input type="email" name="contact_email" class="form-control" placeholder="contact@company.com"/>
      </div>
    </div>
  </div>
  <div class="mt-3 d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Add Customer
    </button>
    <a href="/customers" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
